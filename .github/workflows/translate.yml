name: Translate RSS feeds

on:
  schedule:
    # 毎時 :15 に実行（UTC）。負荷分散のため意図的にズラしてあります
    - cron: "15 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "feeds.yaml"
      - "translate.py"
      - ".github/workflows/translate.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run translator
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: python translate.py

      - name: Commit cache and outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/ cache/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update translated feeds [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
